name: 币安涨幅榜定时采集

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 运行采集脚本
        env:
          TOP_N: '5'
          QUOTE: 'USDT'
          MARKET: 'futures'
        run: python scripts/fetch_top_gainers.py

      - name: 提交更新后的数据文件
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data/history.json
          git diff --staged --quiet || git commit -m "自动更新涨幅榜数据 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
