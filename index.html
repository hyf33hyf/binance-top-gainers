<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVAN DAILY TOP GAINERS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0b0e17;
    --surface: #111827;
    --card: #1a2236;
    --border: #1e2d45;
    --green: #00e676;
    --green-bg: rgba(0,230,118,0.08);
    --yellow: #ffd600;
    --yellow-bg: rgba(255,214,0,0.1);
    --red: #ff1744;
    --red-bg: rgba(255,23,68,0.08);
    --text: #e8eaf6;
    --muted: #546e8a;
    --accent: #00b0ff;
    --accent-bg: rgba(0,176,255,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── HEADER ─────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-wrap: wrap;
    gap: 12px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 18px;
    color: var(--yellow);
    letter-spacing: 1px;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--yellow);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    color: #000;
    font-weight: 900;
  }

  .header-status {
    display: flex; align-items: center; gap: 18px;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
  }
  .status-dot.active {
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .status-label { font-size: 13px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .status-label.active { color: var(--green); }
  .countdown-text {
    font-size: 12px;
    color: var(--yellow);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ─── CONTROLS ───────────────────────────────── */
  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-wrap: wrap;
  }
  .ctrl-group { display: flex; align-items: center; gap: 8px; }
  .ctrl-label {
    font-size: 12px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
  }

  .cloud-status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
    display: inline-block;
  }
  .cloud-status-dot.ok {
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
  }
  .cloud-status-dot.err {
    background: var(--red);
    box-shadow: 0 0 8px var(--red);
  }
  .cloud-badge {
    background: var(--accent-bg);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    padding: 4px 12px;
    border-radius: 14px;
  }

  select {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    outline: none;
    cursor: pointer;
    transition: border-color .2s;
  }
  select:hover { border-color: var(--accent); }
  select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,176,255,.15); }

  /* Top数量切换 */
  .top-toggle {
    display: flex;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
  }
  .top-toggle-btn {
    padding: 6px 16px;
    border-radius: 6px;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
  }
  .top-toggle-btn.active {
    background: var(--yellow);
    color: #000;
  }

  .btn {
    padding: 7px 18px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all .2s;
    font-family: 'Inter', sans-serif;
  }
  .btn-start { background: var(--green); color: #000; }
  .btn-start:hover { background: #00c853; transform: translateY(-1px); }
  .btn-stop {
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
  }
  .btn-stop:hover { background: var(--red-bg); }

  .quote-toggle {
    display: flex;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
  }
  .quote-toggle-btn {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
  }
  .quote-toggle-btn.active { background: var(--accent); color: #000; }

  /* ─── MAIN LAYOUT ────────────────────────────── */
  .main {
    display: grid;
    grid-template-columns: 1fr 260px;
    flex: 1;
    min-height: 0;
  }

  /* ─── DETAIL PANEL (左侧) ─────────────────────── */
  .detail-panel {
    display: flex;
    flex-direction: column;
    min-height: 0;
    border-right: 1px solid var(--border);
  }
  .detail-header {
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  .detail-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }
  .detail-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
  }
  .detail-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 28px;
  }

  /* ─── DATE PANEL (右侧：日期归档) ──────────────── */
  .date-panel {
    display: flex;
    flex-direction: column;
    background: var(--surface);
    min-height: 0;
  }
  .panel-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-header .count {
    background: var(--accent-bg);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-size: 11px;
  }

  .date-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .date-list::-webkit-scrollbar { width: 4px; }
  .date-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .date-item {
    padding: 12px 14px;
    border-radius: 10px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all .15s;
  }
  .date-item:hover { background: var(--card); }
  .date-item.active {
    background: var(--accent-bg);
    border-color: var(--accent);
  }
  .date-item-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .date-main {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .date-item.active .date-main { color: var(--accent); }
  .date-weekday { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .date-coin-count {
    background: var(--green-bg);
    color: var(--green);
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    padding: 1px 7px;
    border-radius: 8px;
  }
  .today-tag {
    display: inline-block;
    margin-top: 6px;
    font-size: 9px;
    background: var(--green-bg);
    color: var(--green);
    padding: 1px 7px;
    border-radius: 8px;
  }

  .empty-dates {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 50px 20px;
    line-height: 1.8;
  }
  .detail-body::-webkit-scrollbar { width: 5px; }
  .detail-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .coin-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .coin-card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    transition: border-color .15s, transform .1s;
    animation: cardIn .3s ease-out;
    cursor: pointer;
  }
  .coin-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .coin-card:active { transform: translateY(0); }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .coin-rank {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: var(--yellow-bg);
    border: 1px solid rgba(255,214,0,.3);
    color: var(--yellow);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .coin-rank.r1 { background: rgba(255,214,0,.25); border-color: var(--yellow); }

  .coin-info { flex: 1; min-width: 0; }
  .coin-symbol {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 16px;
    color: var(--text);
  }
  .coin-symbol .quote { color: var(--muted); font-weight: 400; }
  .coin-meta {
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 4px;
  }

  .sparkline {
    width: 100px;
    height: 36px;
    flex-shrink: 0;
  }

  .coin-pct {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 18px;
    color: var(--green);
    white-space: nowrap;
  }

  .empty-detail {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: var(--muted);
    padding: 40px;
  }
  .empty-icon { font-size: 56px; opacity: .35; }
  .empty-title { font-size: 16px; font-weight: 500; }
  .empty-sub { font-size: 13px; text-align: center; line-height: 1.7; opacity: .8; }

  /* ─── LOG PANEL ─────────────────────────────── */
  .log-panel {
    border-top: 1px solid var(--border);
    height: 110px;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }
  .log-header {
    padding: 6px 20px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .log-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 6px 20px;
  }
  .log-scroll::-webkit-scrollbar { width: 3px; }
  .log-scroll::-webkit-scrollbar-thumb { background: var(--border); }
  .log-line {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    line-height: 1.8;
  }
  .log-line.info { color: var(--accent); }
  .log-line.ok   { color: var(--green); }
  .log-line.warn { color: var(--yellow); }
  .log-line.err  { color: var(--red); }

  /* ─── FOOTER ACTIONS (clear) ─────────────────── */
  .clear-btn {
    font-size: 11px;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    cursor: pointer;
    background: transparent;
    transition: all .15s;
    font-family: 'JetBrains Mono', monospace;
  }
  .clear-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }

  /* ─── KLINE MODAL ────────────────────────────── */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.75);
    backdrop-filter: blur(4px);
    z-index: 500;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: min(860px, 95vw);
    max-height: 90vh;
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,.7);
    animation: scaleIn .2s ease;
  }
  @keyframes scaleIn { from{transform:scale(.96);opacity:0} to{transform:scale(1);opacity:1} }

  .modal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
    gap: 10px;
  }
  .modal-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 700;
    color: var(--text);
  }
  .modal-title span { color: var(--muted); font-weight: 400; font-size: 14px; margin-left: 8px; }

  .modal-toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .iv-btn {
    padding: 4px 10px;
    border-radius: 5px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: all .15s;
  }
  .iv-btn:hover { border-color: var(--accent); color: var(--accent); }
  .iv-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }

  .binance-link-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 12px;
    border-radius: 5px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid var(--yellow);
    background: var(--yellow-bg);
    color: var(--yellow);
    transition: all .15s;
    margin-left: 6px;
    white-space: nowrap;
  }
  .binance-link-btn:hover {
    background: var(--yellow);
    color: #000;
  }
  .binance-link-icon { font-size: 13px; }

  .tv-link-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 12px;
    border-radius: 5px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid #2962ff;
    background: rgba(41,98,255,0.1);
    color: #5b8aff;
    transition: all .15s;
    margin-left: 4px;
    white-space: nowrap;
  }
  .tv-link-btn:hover {
    background: #2962ff;
    color: #fff;
  }

  .modal-close {
    width: 30px; height: 30px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
    margin-left: 8px;
  }
  .modal-close:hover { border-color: var(--red); color: var(--red); }

  .modal-info {
    display: flex; gap: 24px; padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .info-item { display: flex; flex-direction: column; gap: 2px; }
  .info-label { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: .06em; }
  .info-val   { font-size: 14px; font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--text); }
  .info-val.up   { color: var(--green); }
  .info-val.down { color: var(--red); }

  .modal-body {
    flex: 1; padding: 12px 16px;
    position: relative;
    min-height: 320px;
  }
  #klineCanvas {
    width: 100%; height: 100%;
    display: block;
    cursor: crosshair;
  }
  .chart-loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 13px;
    gap: 8px;
  }
  .chart-loading::before {
    content: '';
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .crosshair-tooltip {
    position: absolute;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
    pointer-events: none;
    white-space: nowrap;
    z-index: 10;
    display: none;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">E</div>
    EVAN DAILY TOP GAINERS · 云端版
  </div>
  <div class="header-status">
    <span style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace">24小时不间断采集</span>
  </div>
</header>

<div class="controls">
  <div class="ctrl-group">
    <span class="cloud-status-dot" id="cloudStatusDot"></span>
    <span class="ctrl-label" id="cloudStatusText">正在连接云端数据...</span>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">数据源</span>
    <span class="cloud-badge">☁️ GitHub Actions 自动采集</span>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">最后更新</span>
    <span class="ctrl-label" id="lastUpdateText" style="color:var(--accent)">--</span>
  </div>
  <button class="btn btn-start" id="btnRefresh" onclick="manualRefresh()">↻ 立即刷新</button>
</div>

<div class="main">
  <!-- 左侧：详情区域（当前选中日期的币种） -->
  <div class="detail-panel">
    <div class="detail-header">
      <div>
        <div class="detail-date" id="detailDate">--</div>
        <div class="detail-sub" id="detailSub">选择右侧日期查看详情</div>
      </div>
      <button class="clear-btn" id="clearDayBtn" style="display:none" onclick="clearSelectedDay()">清空当天记录</button>
    </div>
    <div class="detail-body">
      <div class="empty-detail" id="emptyDetail">
        <span class="empty-icon">🏆</span>
        <span class="empty-title">每日强势币种归档</span>
        <span class="empty-sub">数据由云端 GitHub Actions 自动采集，<br>每隔一段时间检测一次涨幅榜，<br>当天每个上榜过的新币种都会被记录下来<br>（同一币种当天不会重复显示）</span>
      </div>
      <div class="coin-grid" id="coinGrid" style="display:none"></div>
    </div>
  </div>

  <!-- 右侧：日期归档列表 -->
  <div class="date-panel">
    <div class="panel-header">
      日期归档
      <span class="count" id="dateCount">0</span>
    </div>
    <div class="date-list" id="dateList">
      <div class="empty-dates">暂无记录<br>等待云端首次采集<br>（最多需要等待一个检测周期）</div>
    </div>
  </div>
</div>

<div class="log-panel">
  <div class="log-header">系统日志</div>
  <div class="log-scroll" id="logScroll">
    <div class="log-line">等待启动...</div>
  </div>
</div>

<script>
const API_BASE = 'https://api.binance.com';

// ⚠️ 重要：把下面两行换成你自己的 GitHub 用户名和仓库名
const GITHUB_USER = 'YOUR_GITHUB_USERNAME';
const GITHUB_USER = 'hyf33hyf';
const GITHUB_REPO  = 'binance-top-gainers';

const DATA_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/data/history.json`;

let quote = 'USDT';
let selectedDate = null;
let cloudData = {};

// ─── DOM ────────────────────────────────────────
const dateList    = document.getElementById('dateList');
const dateCountEl = document.getElementById('dateCount');
const coinGrid    = document.getElementById('coinGrid');
const emptyDetail = document.getElementById('emptyDetail');
const clearDayBtn = document.getElementById('clearDayBtn');
const logScroll   = document.getElementById('logScroll');

// ─── LOG ────────────────────────────────────────
function log(msg, type = '') {
  const now = new Date().toLocaleTimeString('zh-CN');
  const line = document.createElement('div');
  line.className = `log-line ${type}`;
  line.textContent = `[${now}] ${msg}`;
  logScroll.appendChild(line);
  if (logScroll.children.length > 150) logScroll.children[0].remove();
  logScroll.scrollTop = logScroll.scrollHeight;
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ─── 从云端拉取数据 ────────────────────────────────
async function loadCloudData() {
  const dot = document.getElementById('cloudStatusDot');
  const statusText = document.getElementById('cloudStatusText');

  try {
    // 加时间戳参数防止浏览器/CDN缓存旧数据
    const res = await fetch(`${DATA_URL}?t=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    cloudData = data;
    dot.className = 'cloud-status-dot ok';
    statusText.textContent = '云端数据已连接';

    const meta = data._meta || {};
    if (meta.lastUpdate) {
      const updateTime = new Date(meta.lastUpdate);
      document.getElementById('lastUpdateText').textContent = updateTime.toLocaleString('zh-CN');
    }
    if (meta.quote) quote = meta.quote;

    log(`✅ 已从云端加载数据，最后更新: ${meta.lastUpdate || '未知'}`, 'ok');
    renderDateList();
  } catch(e) {
    dot.className = 'cloud-status-dot err';
    statusText.textContent = '云端连接失败';
    log(`❌ 云端数据加载失败: ${e.message}`, 'err');
    log('请检查 index.html 顶部的 GITHUB_USER / GITHUB_REPO 是否已正确填写', 'warn');
  }
}

function loadData() {
  // 兼容原有渲染逻辑：过滤掉 _meta 字段，只返回日期数据
  const result = {};
  for (const key in cloudData) {
    if (key !== '_meta') result[key] = cloudData[key];
  }
  return result;
}

function manualRefresh() {
  log('手动刷新云端数据...', 'info');
  loadCloudData();
}

// ─── 自动定时刷新（每60秒检查一次云端是否有更新）──────
setInterval(loadCloudData, 60 * 1000);

// ─── 渲染：日期列表 ───────────────────────────────
function renderDateList() {
  const data = loadData();
  const dates = Object.keys(data).sort((a, b) => b.localeCompare(a));
  const today = todayStr();
  const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];

  dateCountEl.textContent = dates.length;

  if (dates.length === 0) {
    dateList.innerHTML = '<div class="empty-dates">暂无记录<br>等待云端首次采集<br>（最多需要等待一个检测周期）</div>';
    return;
  }

  dateList.innerHTML = dates.map(d => {
    const dateObj = new Date(d + 'T00:00:00');
    const wd = weekdays[dateObj.getDay()];
    const isToday = d === today;
    const coinCount = data[d].length;
    return `
      <div class="date-item ${selectedDate === d ? 'active' : ''}" data-date="${d}" onclick="selectDate('${d}')">
        <div class="date-item-top">
          <span class="date-main">${d}</span>
          <span class="date-coin-count">${coinCount}</span>
        </div>
        <div class="date-weekday">${wd}</div>
        ${isToday ? '<div class="today-tag">今天</div>' : ''}
      </div>
    `;
  }).join('');

  if (!selectedDate || !dates.includes(selectedDate)) {
    selectDate(dates[0]);
  }
}

// ─── 渲染：详情 ──────────────────────────────────
function selectDate(date) {
  selectedDate = date;
  document.querySelectorAll('.date-item').forEach(el => {
    el.classList.toggle('active', el.dataset.date === date);
  });
  renderDetail(date);
}

function renderDetail(date) {
  const data = loadData();
  const coins = data[date] || [];

  document.getElementById('detailDate').textContent = date;
  const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
  const dateObj = new Date(date + 'T00:00:00');
  document.getElementById('detailSub').textContent = `${weekdays[dateObj.getDay()]} · 共 ${coins.length} 个币种上榜`;

  if (coins.length === 0) {
    emptyDetail.style.display = 'flex';
    coinGrid.style.display = 'none';
    clearDayBtn.style.display = 'none';
    return;
  }

  emptyDetail.style.display = 'none';
  coinGrid.style.display = 'flex';
  clearDayBtn.style.display = '';

  // 按涨幅排序展示（最高的在前）
  const sorted = [...coins].sort((a, b) => b.pct - a.pct);

  coinGrid.innerHTML = sorted.map((c, idx) => {
    const base = c.symbol.replace(quote, '');
    const priceStr = c.price >= 1 ? c.price.toFixed(2) : c.price.toPrecision(5);
    return `
      <div class="coin-card" onclick="openKlineModal('${c.symbol}')">
        <div class="coin-rank ${idx === 0 ? 'r1' : ''}">#${idx+1}</div>
        <div class="coin-info">
          <div class="coin-symbol">${escapeHtml(base)}<span class="quote">/${c.symbol.endsWith('USDT')?'USDT':'BTC'}</span></div>
          <div class="coin-meta">首次上榜 ${c.firstSeen} · 当时排名第${c.rank}名 · 价格 ${priceStr}</div>
        </div>
        <canvas class="sparkline" id="spark-${c.symbol}" width="100" height="36"></canvas>
        <div class="coin-pct">+${c.pct.toFixed(2)}%</div>

  // 异步为每张卡片绘制迷你K线缩略图
  sorted.forEach(c => loadSparkline(c.symbol));

function escapeHtml(s) {

// ─── SPARKLINE (卡片迷你K线缩略图) ──────────────────
async function loadSparkline(symbol) {
  const canvas = document.getElementById(`spark-${symbol}`);
  if (!canvas) return;

  try {
    const res = await fetch(`${API_BASE}/api/v3/klines?symbol=${symbol}&interval=15m&limit=48`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const raw = await res.json();
    const closes = raw.map(k => parseFloat(k[4]));
    if (closes.length < 2) return;

    drawSparkline(canvas, closes);
  } catch(e) {
    // sparkline加载失败静默处理，不影响主功能
  }
}

function drawSparkline(canvas, closes) {
  const dpr = devicePixelRatio || 1;
  const W = canvas.width, H = canvas.height;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const min = Math.min(...closes);
  const max = Math.max(...closes);
  const range = (max - min) || 1;
  const isUp = closes[closes.length - 1] >= closes[0];
  const color = isUp ? '#00e676' : '#ff1744';

  const step = W / (closes.length - 1);
  const points = closes.map((c, i) => ({
    x: i * step,
    y: H - ((c - min) / range) * (H - 4) - 2
  }));

  // 填充渐变区域
  ctx.beginPath();
  ctx.moveTo(points[0].x, H);
  points.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(points[points.length-1].x, H);
  ctx.closePath();
  ctx.fillStyle = isUp ? 'rgba(0,230,118,0.12)' : 'rgba(255,23,68,0.12)';
  ctx.fill();

  // 折线
  ctx.beginPath();
  points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // 末端高亮点
  const last = points[points.length - 1];
  ctx.beginPath();
  ctx.arc(last.x, last.y, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

// ─── KLINE MODAL (点击卡片弹出详细K线) ───────────────
let klineSymbol = '';
let klineIv     = '5m';
let klineData   = [];
let klineWs     = null;
let klineAnims  = 0;

function openInBinance() {
  if (!klineSymbol) return;
  const { base, quote: q } = splitSymbol(klineSymbol);
  const url = `https://www.binance.com/zh-CN/trade/${base}_${q}?type=spot`;
  window.open(url, '_blank', 'noopener,noreferrer');
}

function openInTradingView() {
  if (!klineSymbol) return;
  // TradingView周期参数映射: 分钟数字 / 小时转分钟 / 日用 D
  const ivMap = {
    '1m': '1', '3m': '3', '5m': '5', '15m': '15', '30m': '30',
    '1h': '60', '4h': '240', '1d': 'D'
  };
  const tvInterval = ivMap[klineIv] || '5';
  const url = `https://www.tradingview.com/chart/?symbol=BINANCE:${klineSymbol}&interval=${tvInterval}`;
  window.open(url, '_blank', 'noopener,noreferrer');
}

function openKlineModal(symbol) {
  klineSymbol = symbol;
  klineIv     = '5m';

  const modal = document.getElementById('klineModal');
  modal.style.display = 'flex';

  const { base, quote: q } = splitSymbol(symbol);
  document.getElementById('modalTitle').innerHTML =
    `<span style="color:var(--text);font-weight:700">${base}</span>`+
    `<span> / ${q}</span>`;

  setActiveIvBtn(klineIv);
  document.getElementById('chartLoading').style.display = 'flex';
  document.getElementById('klineCanvas').style.display  = 'none';

  connectKlineWs();
}

function closeKlineModal() {
  document.getElementById('klineModal').style.display = 'none';
  disconnectKlineWs();
  cancelAnimationFrame(klineAnims);
  document.getElementById('crosshairTip').style.display = 'none';
}

function onBackdropClick(e) {
  if (e.target === document.getElementById('klineModal')) closeKlineModal();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeKlineModal(); });

function switchKlineIv(iv) {
  klineIv = iv;
  setActiveIvBtn(iv);
  disconnectKlineWs();
  klineData = [];
  document.getElementById('chartLoading').style.display = 'flex';
  document.getElementById('klineCanvas').style.display  = 'none';
  connectKlineWs();
}

function setActiveIvBtn(iv) {
  document.querySelectorAll('#modalToolbar .iv-btn[data-iv]').forEach(b => {
    b.classList.toggle('active', b.dataset.iv === iv);
  });
}

function splitSymbol(symbol) {
  const q = symbol.endsWith('USDT') ? 'USDT' : (symbol.endsWith('BTC') ? 'BTC' : '');
  const base = q ? symbol.slice(0, symbol.length - q.length) : symbol;
  return { base, quote: q };
}

// ── WebSocket实时连接 ──
function connectKlineWs() {
  disconnectKlineWs();
  const streamSym = klineSymbol.toLowerCase();
  const wsUrl = `wss://stream.binance.com:9443/stream?streams=${streamSym}@kline_${klineIv}/${streamSym}@ticker`;

  klineWs = new WebSocket(wsUrl);

  klineWs.onopen = () => {
    log(`K线已连接: ${klineSymbol} ${klineIv}`, 'info');
    fetchHistKline();
  };

  klineWs.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (!msg.data) return;
    if (msg.stream && msg.stream.endsWith('@ticker')) {
      handleTicker(msg.data);
      return;
    }
    if (msg.data.e === 'kline') {
      handleKlineMsg(msg.data.k);
    }
  };

  klineWs.onerror = () => log(`K线连接错误: ${klineSymbol}`, 'err');
  klineWs.onclose = () => {};
}

function disconnectKlineWs() {
  if (klineWs) {
    klineWs.onclose = null;
    klineWs.close();
    klineWs = null;
  }
}

async function fetchHistKline() {
  try {
    const url = `${API_BASE}/api/v3/klines?symbol=${klineSymbol}&interval=${klineIv}&limit=80`;
    const res  = await fetch(url);
    const raw  = await res.json();
    klineData  = raw.map(k => ({ t:+k[0], o:+k[1], h:+k[2], l:+k[3], c:+k[4], v:+k[5] }));
    renderAll();
  } catch(err) {
    log('历史K线加载失败: ' + err.message, 'err');
  }
}

function handleKlineMsg(k) {
  if (!klineData.length) return;
  const candle = { t:+k.t, o:+k.o, h:+k.h, l:+k.l, c:+k.c, v:+k.v };
  const last = klineData[klineData.length - 1];
  if (candle.t === last.t) {
    klineData[klineData.length - 1] = candle;
  } else if (candle.t > last.t) {
    klineData.push(candle);
    if (klineData.length > 100) klineData.shift();
  }
  renderAll();
}

function handleTicker(t) {
  const fmt    = v => +v >= 1 ? (+v).toFixed(2) : (+v).toPrecision(5);
  const fmtVol = v => +v>=1e6?(+v/1e6).toFixed(2)+'M':+v>=1e3?(+v/1e3).toFixed(1)+'K':(+v).toFixed(0);

  const price  = +t.c;
  const chgPct = +t.P;

  document.getElementById('mi-price').textContent = fmt(price);
  const chgEl = document.getElementById('mi-change');
  chgEl.textContent = (chgPct>=0?'+':'')+chgPct.toFixed(2)+'%';
  chgEl.className = 'info-val '+(chgPct>=0?'up':'down');
  document.getElementById('mi-high').textContent = fmt(+t.h);
  document.getElementById('mi-low').textContent  = fmt(+t.l);
  document.getElementById('mi-vol').textContent  = fmtVol(+t.v);
  document.getElementById('mi-time').textContent = new Date().toLocaleTimeString('zh-CN');
  document.getElementById('modalSubtitle').textContent = klineIv;
}

function renderAll() {
  cancelAnimationFrame(klineAnims);
  klineAnims = requestAnimationFrame(drawChart);
}

// ─── CANVAS K线绘制 ──────────────────────────────
function drawChart() {
  const canvas  = document.getElementById('klineCanvas');
  const loading = document.getElementById('chartLoading');
  if (!klineData.length) return;

  loading.style.display = 'none';
  canvas.style.display  = 'block';

  const body = canvas.parentElement;
  const W = body.clientWidth  - 32;
  const H = body.clientHeight - 24;
  const dpr = devicePixelRatio || 1;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const PL=8, PR=68, PT=14, PB=50;
  const volH   = Math.floor(H * 0.18);
  const chartH = H - PT - PB - volH - 8;
  const chartW = W - PL - PR;

  const n = klineData.length;
  const highs = klineData.map(k=>k.h);
  const lows  = klineData.map(k=>k.l);
  const vols  = klineData.map(k=>k.v);
  let pMax = Math.max(...highs), pMin = Math.min(...lows);
  const pad = (pMax - pMin) * 0.06 || pMax * 0.02;
  pMax += pad; pMin -= pad;
  const vMax = Math.max(...vols) || 1;

  const step    = chartW / n;
  const candleW = Math.max(1.5, step * 0.7);

  const px = p => PT + chartH - ((p - pMin) / (pMax - pMin)) * chartH;
  const cx = i => PL + (i + 0.5) * step;
  const vy = v => H - PB - (v / vMax) * volH;

  ctx.clearRect(0, 0, W, H);

  const bg = ctx.createLinearGradient(0, PT, 0, PT+chartH);
  bg.addColorStop(0, 'rgba(0,176,255,0.03)');
  bg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = bg;
  ctx.fillRect(PL, PT, chartW, chartH);

  const gridCount = 6;
  ctx.lineWidth = 0.5;
  for (let i=0; i<=gridCount; i++) {
    const y = PT + (chartH / gridCount) * i;
    ctx.strokeStyle = 'rgba(30,45,69,0.9)';
    ctx.beginPath(); ctx.moveTo(PL, y); ctx.lineTo(W-PR, y); ctx.stroke();
    const price = pMax - ((pMax-pMin)/gridCount)*i;
    ctx.fillStyle = '#546e8a';
    ctx.font = '10px JetBrains Mono,monospace';
    ctx.textAlign = 'left';
    const lbl = price>=1000 ? price.toFixed(1) : price>=1 ? price.toFixed(2) : price.toPrecision(4);
    ctx.fillText(lbl, W-PR+5, y+3);
  }

  const vGridStep = Math.ceil(n/8);
  ctx.strokeStyle = 'rgba(30,45,69,0.5)';
  klineData.forEach((_,i) => {
    if (i % vGridStep !== 0) return;
    const x = cx(i);
    ctx.beginPath(); ctx.moveTo(x, PT); ctx.lineTo(x, H-PB); ctx.stroke();
  });

  klineData.forEach((k,i) => {
    const isUp = k.c >= k.o;
    const x    = cx(i);
    const vTop = vy(k.v);
    const vBot = H - PB;
    ctx.fillStyle = isUp ? 'rgba(0,230,118,0.28)' : 'rgba(255,23,68,0.28)';
    ctx.fillRect(x - candleW/2, vTop, candleW, vBot - vTop);
  });

  ctx.strokeStyle = 'rgba(30,45,69,0.8)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(PL, H-PB-volH); ctx.lineTo(W-PR, H-PB-volH);
  ctx.stroke();
  ctx.fillStyle = '#546e8a';
  ctx.font = '9px JetBrains Mono,monospace';
  ctx.textAlign = 'left';
  ctx.fillText('VOL', PL+2, H-PB-volH-3);

  klineData.forEach((k,i) => {
    const isUp   = k.c >= k.o;
    const x      = cx(i);
    const isLast = i === n-1;
    const color  = isUp ? '#00e676' : '#ff1744';

    ctx.strokeStyle = color;
    ctx.lineWidth   = isLast ? 1.5 : 1;
    ctx.beginPath();
    ctx.moveTo(x, px(k.h));
    ctx.lineTo(x, px(k.l));
    ctx.stroke();

    const top   = Math.min(px(k.o), px(k.c));
    const bodyH = Math.max(1.5, Math.abs(px(k.c) - px(k.o)));

    if (isUp) {
      ctx.fillStyle = color;
      ctx.fillRect(x - candleW/2, top, candleW, bodyH);
      if (isLast) {
        ctx.shadowColor = color;
        ctx.shadowBlur  = 6;
        ctx.fillRect(x - candleW/2, top, candleW, bodyH);
        ctx.shadowBlur = 0;
      }
    } else {
      ctx.lineWidth   = 1;
      ctx.strokeStyle = color;
      ctx.strokeRect(x - candleW/2, top, candleW, bodyH);
    }
  });

  const lastC = klineData[n-1].c;
  const lastY = px(lastC);
  const prevC = klineData[n-2]?.c ?? lastC;
  const lineColor = lastC >= prevC ? '#00e676' : '#ff1744';

  ctx.setLineDash([4,3]);
  ctx.strokeStyle = lineColor + '88';
  ctx.lineWidth   = 1;
  ctx.beginPath(); ctx.moveTo(PL, lastY); ctx.lineTo(W-PR, lastY); ctx.stroke();
  ctx.setLineDash([]);

  const tagW = PR - 4, tagH = 16;
  const tagX = W - PR + 2, tagY = lastY - tagH/2;
  ctx.fillStyle = lineColor;
  ctx.beginPath();
  ctx.roundRect(tagX, tagY, tagW, tagH, 3);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.font = 'bold 10px JetBrains Mono,monospace';
  ctx.textAlign = 'center';
  const lbl = lastC>=1 ? lastC.toFixed(2) : lastC.toPrecision(5);
  ctx.fillText(lbl, tagX + tagW/2, tagY + 11);

  ctx.fillStyle   = '#546e8a';
  ctx.font        = '9px JetBrains Mono,monospace';
  ctx.textAlign   = 'center';
  const xLabelStep = Math.ceil(n/8);
  klineData.forEach((k,i) => {
    if (i % xLabelStep !== 0) return;
    const d = new Date(k.t);
    const useDate = ['1d','3d','1w','1M'].includes(klineIv);
    const lbl2 = useDate
      ? `${d.getMonth()+1}/${d.getDate()}`
      : `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    ctx.fillText(lbl2, cx(i), H-PB+14);
  });

  setupCrosshair(canvas, W, H, PL, PR, PT, PB, chartH, pMin, pMax, step);
}

function setupCrosshair(canvas, W, H, PL, PR, PT, PB, chartH, pMin, pMax, step) {
  const tip = document.getElementById('crosshairTip');

  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx   = e.clientX - rect.left;
    const my   = e.clientY - rect.top;
    const i    = Math.floor((mx - PL) / step);

    if (i < 0 || i >= klineData.length || mx > W-PR || my < PT || my > H-PB) {
      tip.style.display = 'none';
      return;
    }

    const k    = klineData[i];
    const isUp = k.c >= k.o;
    const gain = ((k.c-k.o)/k.o*100);
    const fmt  = v => +v>=1 ? (+v).toFixed(2) : (+v).toPrecision(5);
    const fmtV = v => +v>=1e6?(+v/1e6).toFixed(2)+'M':+v>=1e3?(+v/1e3).toFixed(1)+'K':(+v).toFixed(0);
    const d    = new Date(k.t);
    const ts   = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} `+
                 `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const col  = isUp ? 'var(--green)' : 'var(--red)';

    tip.style.display = 'block';
    tip.innerHTML = `
      <div style="color:var(--muted);margin-bottom:3px;font-size:10px">${ts} · ${klineIv}</div>
      <span style="color:var(--muted)">开</span> <span style="color:var(--text)">${fmt(k.o)}</span> &nbsp;
      <span style="color:var(--muted)">高</span> <span style="color:var(--green)">${fmt(k.h)}</span> &nbsp;
      <span style="color:var(--muted)">低</span> <span style="color:var(--red)">${fmt(k.l)}</span> &nbsp;
      <span style="color:var(--muted)">收</span> <span style="color:${col}">${fmt(k.c)}</span> &nbsp;
      <span style="color:${col};font-weight:700">${isUp?'+':''}${gain.toFixed(2)}%</span><br>
      <span style="color:var(--muted)">量</span> <span style="color:var(--accent)">${fmtV(k.v)}</span>
    `;

    let tx = mx + 14, ty = my - 70;
    if (tx + 340 > W) tx = mx - 354;
    if (ty < 2) ty = my + 14;
    tip.style.left = tx + 'px';
    tip.style.top  = ty + 'px';
  };

  canvas.onmouseleave = () => { tip.style.display = 'none'; };
}
